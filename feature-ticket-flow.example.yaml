# `/feature` stays profile-agnostic:
# /feature Build an onboarding flow with checklist and welcome email
#
# Ticket files should declare their own execution target:
# - Profile: frontend
# - Requires: STK-001
#
# `defaultProfile` is used as a fallback when a ticket does not declare one
# or when you manually set a feature-level fallback with /feature-profile.
specsRoot: ./docs/technical-specs
defaultProfile: default
tdd: false

# User-facing configurable spec-authoring skill slots.
# The bundled planning/execution workflow skills stay internal to the package.
# Use generic slot names so each project can swap underlying skills if needed.
#
# authoringSkills:
#   productRequirementsSkill: prd-development
#   requirementsRefinementSkill: spec-driven-workflow
#   technicalDesignSkill: technical-specification
#
# Optional project-level TDD toggle.
# If true, the package will instruct planning/execution prompts to prefer TDD.
# Responsibility for having a working test suite remains with the project.
# tdd: true

profiles:
  default:
    preferSubagents: true
    agents:
      planner:
        agent: planner
        model: anthropic/claude-sonnet-4
        thinking: medium
      worker:
        agent: worker
        model: anthropic/claude-sonnet-4
        thinking: high
      reviewer:
        agent: reviewer
        model: openai/gpt-5.4
        thinking: medium

  frontend:
    matchAny: [ui, dashboard, page, landing, onboarding]
    preferSubagents: true
    agents:
      planner:
        model: anthropic/claude-sonnet-4
      worker:
        model: anthropic/claude-sonnet-4
      reviewer:
        model: openai/gpt-5.4

  backend:
    matchAny: [api, backend, worker, queue, cron, db, database]
    preferSubagents: true
    agents:
      planner:
        model: openai/gpt-5.4
      worker:
        model: anthropic/claude-sonnet-4
      reviewer:
        model: openai/gpt-5.4

  direct-mode:
    matchAny: [hotfix, tiny-fix, one-off]
    preferSubagents: false
    agents:
      worker:
        model: anthropic/claude-sonnet-4
